<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --win:      #161b22;
      --header:   #1c2230;
      --border:   #21262d;
      --input-bg: #0d1117;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --accent:   #7c3aed;
      --me-bg:    #2d1f5e;
      --me-text:  #c4b5fd;
      --them-bg:  #1c2230;
      --them-text:#b0bec5;
      --dot-on:   #3fb950;
      --dot-off:  #484f58;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ─ top bar ─ */
    .bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bar a {
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
    }
    .bar a:hover { color: var(--text); }

    .bar h1 {
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* ─ grid of 5 windows ─ */
    .windows {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      overflow: hidden;
      min-height: 0;
    }

    /* ─ single chat window ─ */
    .win {
      background: var(--win);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .win-head {
      background: var(--header);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dot-on);
      flex-shrink: 0;
      position: relative;
    }
    .dot::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: var(--dot-on);
      opacity: 0.25;
      animation: glow 2s ease-in-out infinite;
    }
    .dot.busy { background: #e3b341; }
    .dot.busy::after { background: #e3b341; animation-duration: 0.7s; }
    .dot.empty { background: var(--dot-off); }
    .dot.empty::after { display: none; }

    @keyframes glow {
      0%,100% { transform: scale(1); opacity: 0.25; }
      50%      { transform: scale(2); opacity: 0; }
    }

    .win-name {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .win-name.placeholder { color: var(--muted); font-weight: 400; }

    .cfg-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.1s;
    }
    .cfg-btn:hover { color: var(--text); }

    /* ─ messages ─ */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      min-height: 0;
    }
    .msgs::-webkit-scrollbar { width: 3px; }
    .msgs::-webkit-scrollbar-thumb { background: var(--border); }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .bubble-wrap.me { align-items: flex-end; }
    .bubble-wrap.them { align-items: flex-start; }

    .who {
      font-size: 0.62rem;
      color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 0.8rem;
      line-height: 1.5;
      max-width: 90%;
      word-break: break-word;
    }
    .bubble-wrap.me   .bubble { background: var(--me-bg);   color: var(--me-text);   border-bottom-right-radius: 2px; }
    .bubble-wrap.them .bubble { background: var(--them-bg); color: var(--them-text); border-bottom-left-radius: 2px; }

    /* typing dots */
    .typing {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 9px 12px;
      background: var(--them-bg);
      border-radius: 10px;
      border-bottom-left-radius: 2px;
      width: fit-content;
    }
    .td {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted);
      animation: tb 1.1s ease-in-out infinite;
    }
    .td:nth-child(2) { animation-delay: 0.18s; }
    .td:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tb {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-4px); opacity: 1; }
    }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .empty-state span:first-child { font-size: 1.5rem; opacity: 0.25; }
    .empty-state span:last-child  { font-size: 0.75rem; color: var(--muted); }
    .empty-state:hover span:last-child { color: var(--text); }

    /* ─ input row ─ */
    .input-row {
      border-top: 1px solid var(--border);
      padding: 8px;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .chat-in {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.12s;
    }
    .chat-in:focus { border-color: var(--accent); }
    .chat-in::placeholder { color: var(--muted); }
    .chat-in:disabled { opacity: 0.4; }

    .send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: opacity 0.12s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: default; }

    /* ─ modal ─ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--win);
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
      width: 360px;
      max-width: calc(100vw - 40px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transform: scale(0.96);
      transition: transform 0.15s;
    }
    .overlay.open .modal { transform: scale(1); }

    .modal h2 { font-size: 0.95rem; font-weight: 700; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field textarea {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; font-size: 0.8rem; }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 7px 16px; font-size: 0.83rem; cursor: pointer;
    }
    .btn-ghost:hover { color: var(--text); border-color: #4a5568; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      border-radius: 7px; padding: 7px 18px; font-size: 0.83rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* ─ responsive ─ */
    @media (max-width: 900px) {
      .windows { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 580px) {
      .windows { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 380px) {
      .windows { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="bar">
    <a href="../index.html">← Home</a>
    <h1>🤖 Agents</h1>
  </div>

  <div class="windows" id="grid"></div>

  <!-- configure modal -->
  <div class="overlay" id="overlay" onclick="maybeClose(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 id="modalTitle">Configure Agent</h2>
      <div class="field">
        <label>Name</label>
        <input id="mName" type="text" placeholder="analyst" maxlength="24" />
      </div>
      <div class="field">
        <label>Role</label>
        <input id="mRole" type="text" placeholder="What this agent does" maxlength="50" />
      </div>
      <div class="field">
        <label>Prompt</label>
        <textarea id="mPrompt" rows="3" placeholder="System prompt…"></textarea>
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>

<script>
// ── state ──────────────────────────────────────
const SLOTS = 5;
let editing = null; // slot index being edited

const defaults = [
  {
    name: 'Planner',
    role: 'Orchestrator — task decomposition',
    prompt: 'You are the Planner. Produce a minimal task decomposition, assign ownership to agents, and define explicit success criteria. Do NOT propose solutions or write outputs.',
    greeting: 'Ready. Give me a task and I\'ll decompose it, assign ownership, and define success criteria. I will not propose solutions or write outputs.'
  },
  {
    name: 'Specialist A',
    role: 'Domain / research',
    prompt: 'You are Specialist A. Complete ONLY your assigned task. State assumptions explicitly and list uncertainties.',
    greeting: 'Standing by for my assigned task. I\'ll return findings, assumptions, and risks — nothing else.'
  },
  {
    name: 'Specialist B',
    role: 'Implementation / drafting',
    prompt: 'You are Specialist B. Produce the artefact only. Optimise for correctness over elegance. Do not explain your choices.',
    greeting: 'Ready to produce the artefact. Send me the Planner task and Specialist A\'s findings summary.'
  },
  {
    name: 'Reviewer',
    role: 'Adversarial reviewer',
    prompt: 'You are the Reviewer. Assume the artefact is wrong. Actively attempt to break it. Surface risks, gaps, and failures. Do NOT rewrite the artefact.',
    greeting: 'Assuming the artefact is wrong. Send it to me and I\'ll find every flaw, gap, and risk — with severity and evidence.'
  },
  {
    name: 'Synthesiser',
    role: 'Final authority',
    prompt: 'You are the Synthesiser. Resolve reviewer issues where possible. Surface unresolved risks explicitly. Produce the final output only.',
    greeting: 'Awaiting all prior outputs. I\'ll resolve the Reviewer\'s issues, surface anything unresolvable, and deliver the final answer.'
  },
];

function load() {
  try {
    const s = localStorage.getItem('robb-agents-v3');
    if (s) return JSON.parse(s);
  } catch {}
  return defaults.map((d, i) => ({
    slot: i,
    name: d.name,
    role: d.role,
    prompt: d.prompt,
    msgs: [{ from: 'them', text: d.greeting }],
    busy: false
  }));
}

function persist(slots) {
  localStorage.setItem('robb-agents-v3', JSON.stringify(slots));
}

let slots = load();

// ── render ─────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  slots.forEach((slot, i) => {
    grid.appendChild(buildWin(slot, i));
  });
}

function buildEmpty(i) {
  const div = document.createElement('div');
  div.className = 'win';
  div.innerHTML = `
    <div class="win-head">
      <div class="dot empty"></div>
      <span class="win-name placeholder">empty</span>
    </div>
    <div class="empty-state" onclick="openNew(${i})">
      <span>＋</span>
      <span>Add agent</span>
    </div>
    <div class="input-row">
      <input class="chat-in" disabled placeholder="No agent" />
      <button class="send-btn" disabled>▶</button>
    </div>
  `;
  return div;
}

function buildWin(slot, i) {
  const div = document.createElement('div');
  div.className = 'win';
  div.id = `win-${i}`;
  div.innerHTML = `
    <div class="win-head">
      <div class="dot${slot.busy ? ' busy' : ''}" id="dot-${i}"></div>
      <span class="win-name">${esc(slot.name)}</span>
      <button class="cfg-btn" onclick="openEdit(${i})">⚙</button>
    </div>
    <div class="msgs" id="msgs-${i}"></div>
    <div class="input-row">
      <input
        class="chat-in"
        id="in-${i}"
        placeholder="Message ${esc(slot.name)}…"
        onkeydown="if(event.key==='Enter')send(${i})"
        ${slot.busy ? 'disabled' : ''}
      />
      <button class="send-btn" id="sbtn-${i}" onclick="send(${i})" ${slot.busy ? 'disabled' : ''}>▶</button>
    </div>
  `;
  setTimeout(() => paintMsgs(i), 0);
  return div;
}

function paintMsgs(i) {
  const slot = slots[i];
  if (!slot) return;
  const el = document.getElementById(`msgs-${i}`);
  if (!el) return;
  el.innerHTML = slot.msgs.map(m => `
    <div class="bubble-wrap ${m.from === 'me' ? 'me' : 'them'}">
      <span class="who">${m.from === 'me' ? 'you' : esc(slot.name)}</span>
      <div class="bubble">${esc(m.text)}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

// ── send ───────────────────────────────────────
function send(i) {
  const slot = slots[i];
  if (!slot || slot.busy) return;
  const inp = document.getElementById(`in-${i}`);
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  slot.msgs.push({ from: 'me', text });
  paintMsgs(i);
  setBusy(i, true);

  // show typing
  const el = document.getElementById(`msgs-${i}`);
  const t = document.createElement('div');
  t.id = `typing-${i}`;
  t.className = 'bubble-wrap them';
  t.innerHTML = `<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  el.appendChild(t);
  el.scrollTop = el.scrollHeight;

  setTimeout(() => {
    const te = document.getElementById(`typing-${i}`);
    if (te) te.remove();
    slot.msgs.push({ from: 'them', text: reply(slot, text) });
    setBusy(i, false);
    paintMsgs(i);
    persist(slots);
  }, 700 + Math.random() * 900);
}

function setBusy(i, busy) {
  const slot = slots[i];
  if (!slot) return;
  slot.busy = busy;
  const dot = document.getElementById(`dot-${i}`);
  const inp = document.getElementById(`in-${i}`);
  const btn = document.getElementById(`sbtn-${i}`);
  if (dot) dot.className = `dot${busy ? ' busy' : ''}`;
  if (inp) inp.disabled = busy;
  if (btn) btn.disabled = busy;
}

function reply(slot, task) {
  switch (slot.name) {
    case 'Planner':
      return `Task decomposition for: "${task}"\n\n1. Research phase → Specialist A\n2. Artefact creation → Specialist B\n3. Adversarial review → Reviewer\n4. Final resolution → Synthesiser\n\nSuccess criteria: deliverable is correct, complete, and risks are surfaced.\n\nRun the full workflow:\npython agents.py "${task}"`;

    case 'Specialist A':
      return `Findings for: "${task}"\n\nAssumptions:\n— [state any assumptions here]\n\nRisks / uncertainties:\n— [list what isn't known]\n\nTo execute:\npython agents.py "${task}"`;

    case 'Specialist B':
      return `Artefact produced for: "${task}"\n\n[Single clean output — no justification, no commentary.]\n\nTo execute:\npython agents.py "${task}"`;

    case 'Reviewer':
      return `Review of artefact for: "${task}"\n\nIssues found:\n\n[SEVERITY: HIGH]\nEvidence: —\nFix: —\n\nTo execute:\npython agents.py "${task}"`;

    case 'Synthesiser':
      return `Final output for: "${task}"\n\nResolved issues: [list]\nResidual risks: [list any unresolved items explicitly]\n\n[Final answer here.]\n\nTo execute:\npython agents.py "${task}"`;

    default:
      return `Received: "${task}"\n\nRun: python agents.py "${task}"`;
  }
}

// ── modal ──────────────────────────────────────
function openNew(i) {
  editing = i;
  document.getElementById('modalTitle').textContent = 'Add Agent';
  document.getElementById('mName').value = '';
  document.getElementById('mRole').value = '';
  document.getElementById('mPrompt').value = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('mName').focus(), 150);
}

function openEdit(i) {
  const slot = slots[i];
  editing = i;
  document.getElementById('modalTitle').textContent = `Configure · ${slot.name}`;
  document.getElementById('mName').value = slot.name;
  document.getElementById('mRole').value = slot.role;
  document.getElementById('mPrompt').value = slot.prompt;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editing = null;
}

function maybeClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveModal() {
  const name   = document.getElementById('mName').value.trim();
  const role   = document.getElementById('mRole').value.trim();
  const prompt = document.getElementById('mPrompt').value.trim();
  if (!name) { document.getElementById('mName').focus(); return; }

  if (slots[editing]) {
    // editing existing
    slots[editing].name   = name;
    slots[editing].role   = role || 'Agent';
    slots[editing].prompt = prompt;
  } else {
    // new agent
    slots[editing] = {
      slot: editing,
      name, role: role || 'Agent', prompt,
      msgs: [{ from: 'them', text: `${name} online. Ready for instructions.` }],
      busy: false
    };
  }

  persist(slots);
  render();
  closeModal();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

render();
</script>
</body>
</html>
